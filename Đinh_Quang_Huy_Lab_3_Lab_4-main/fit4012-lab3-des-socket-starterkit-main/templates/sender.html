<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SENDER - MÁY GỬI (Client)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-8 font-sans flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden border border-slate-200">
        <div class="bg-blue-600 p-6 text-white text-center shadow-inner">
            <h1 class="text-2xl font-bold">MÁY GỬI (SENDER)</h1>
            <p class="text-blue-100 text-sm mt-1">Chạy trên cổng Web 5000</p>
        </div>

        <div class="p-6">
            <label class="block font-bold text-slate-700 mb-2 uppercase text-xs">Tin nhắn bản rõ (Plaintext)</label>
            <textarea id="inputMsg" rows="4" class="w-full border-2 border-slate-200 rounded-lg p-3 focus:border-blue-500 outline-none transition" placeholder="Nhập chữ cần gửi..."></textarea>
            
            <button onclick="sendData()" id="sendBtn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow transition">
                Mã hoá & Bắn gói tin TCP
            </button>

            <!-- Khung báo trạng thái -->
            <div id="statusBox" class="mt-4 p-4 rounded-lg hidden text-sm font-mono break-all"></div>
        </div>
    </div>

    <script>
        async function sendData() {
            const msg = document.getElementById('inputMsg').value;
            const btn = document.getElementById('sendBtn');
            const statusBox = document.getElementById('statusBox');

            if (!msg) return alert("Nhập tin trước!");
            
            btn.disabled = true; btn.innerText = "Đang gửi...";
            
            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                
                statusBox.classList.remove('hidden');
                if(data.status === 'success') {
                    statusBox.className = 'mt-4 p-4 rounded-lg text-sm font-mono break-all bg-green-50 text-green-800 border border-green-200';
                    statusBox.innerHTML = `<b>Gửi thành công!</b><br>Key: ${data.key_hex}<br>IV: ${data.iv_hex}<br>GóiTCP: ${data.packet_len} bytes`;
                } else {
                    statusBox.className = 'mt-4 p-4 rounded-lg text-sm font-mono break-all bg-red-50 text-red-800 border border-red-200';
                    statusBox.innerHTML = `<b>LỖI</b><br>${data.message}`;
                }
            } catch(e) {
                alert("Lỗi kết nối Web Backend");
            }
            btn.disabled = false; btn.innerText = "Mã hoá & Bắn gói tin TCP";
            document.getElementById('inputMsg').value = '';
        }
    </script>
</body>
</html>
