<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Mã hoá DES (Socket)</title>
    <!-- Tích hợp Tailwind CSS cho giao diện hiện đại -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cyber-grid { background-image: radial-gradient(rgba(14, 165, 233, 0.1) 1px, transparent 1px); background-size: 24px 24px; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 cyber-grid min-h-screen font-sans text-gray-800 p-4 sm:p-8 flex items-center justify-center">

    <div class="max-w-5xl w-full glass-panel rounded-2xl shadow-2xl border border-gray-200 overflow-hidden flex flex-col md:flex-row">
        
        <!-- Cột Trái: Khu vực nhập liệu (Input Section) -->
        <div class="w-full md:w-5/12 bg-white p-8 flex flex-col justify-center border-r border-gray-100">
            <div class="mb-8 text-center md:text-left">
                <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-100 text-blue-600 rounded-xl mb-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">Data Sender</h1>
                <p class="text-sm text-gray-500 font-medium tracking-wide pb-4 border-b border-gray-100">GIAO THỨC BẢO MẬT TCP SOCKET</p>
            </div>

            <div class="mb-6 flex-grow">
                <label for="messageInput" class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wider text-xs">Nội dung văn bản (Plaintext)</label>
                <textarea id="messageInput" rows="4" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 bg-gray-50 focus:bg-white outline-none transition-all shadow-sm resize-none text-gray-700" placeholder="Nhập đoạn văn bản tối mật của bạn vào đây..."></textarea>
            </div>

            <button id="sendBtn" onclick="sendMessage()" class="group relative w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all flex items-center justify-center overflow-hidden">
                <span class="absolute right-0 w-8 h-32 -mt-12 transition-all duration-1000 transform translate-x-12 bg-white opacity-10 rotate-12 group-hover:-translate-x-96 ease"></span>
                <svg id="btnIcon" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span id="btnText">Tiến Hành Mã Hoá (DES-CBC)</span>
            </button>
        </div>

        <!-- Cột Phải: Khu vực Kết quả (Output/Analytics) -->
        <div class="w-full md:w-7/12 bg-slate-50 p-8 relative flex flex-col h-full">
            <h3 class="text-lg font-bold text-slate-800 uppercase tracking-wider text-sm mb-6 flex items-center shrink-0">
                <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.8)]"></span>
                Trạng Thái Mã Hoá (Cipher)
            </h3>
            
            <!-- Trạng thái chờ -->
            <div id="waitingState" class="flex-grow flex flex-col items-center justify-center text-gray-400 min-h-[300px]">
                <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="text-sm font-medium">Hệ thống đang chờ lệnh truyền tải...</p>
            </div>

            <!-- Box Kết quả (Bị ẩn lúc đầu) -->
            <div id="resultBox" class="hidden fade-in flex-col h-full space-y-4 overflow-hidden">
                
                <!-- Status Alert -->
                <div id="statusAlert" class="shrink-0 p-4 rounded-xl flex items-start shadow-sm mb-2">
                    <div id="statusIcon" class="mr-3 font-xl mt-0.5">🚀</div>
                    <div>
                        <h4 id="statusTitle" class="font-bold text-sm"></h4>
                        <p id="statusDesc" class="text-xs mt-1 opacity-90"></p>
                    </div>
                </div>

                <!-- Hex Values Grid -->
                <div class="shrink-0 space-y-4 mb-4">
                    <!-- Packet Segment Box-->
                    <div class="mb-4 pt-2">
                        <p class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">Cấu trúc gói tin gửi đi (Packet Segment)</p>
                        <div class="flex h-8 w-full rounded-lg overflow-hidden shadow-inner text-center text-xs font-bold text-white uppercase tracking-wider">
                            <div class="w-2/12 bg-pink-500 flex items-center justify-center">KEY</div>
                            <div class="w-2/12 bg-orange-500 flex items-center justify-center">IV</div>
                            <div class="w-2/12 bg-teal-500 flex items-center justify-center">HDR</div>
                            <div class="w-6/12 bg-blue-500 flex items-center justify-center">CIPHERTEXT</div>
                        </div>
                    </div>
                
                    <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex items-center justify-between">
                        <div class="w-full">
                            <span class="text-[10px] font-bold text-pink-600 uppercase tracking-widest block mb-1">Khóa & IV (16 Bytes Đầu)</span>
                            <div class="flex flex-col space-y-2">
                                <code id="outKey" class="text-slate-800 text-xs font-mono break-all bg-pink-50 px-3 py-2 rounded"></code>
                                <code id="outIv" class="text-slate-800 text-xs font-mono break-all bg-orange-50 px-3 py-2 rounded"></code>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm flex flex-col group relative">
                        <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest block mb-2 border-b border-slate-100 pb-2">Bản Mã Hoá [Ciphertext]</span>
                        <code id="outCipher" class="text-slate-700 text-sm font-mono break-all leading-relaxed whitespace-pre-wrap max-h-48 overflow-y-auto custom-scrollbar"></code>
                    </div>
                </div>

            </div>
            
        </div>
    </div>

    <script>
        async function sendMessage() {
            const message = document.getElementById('messageInput').value;
            const btn = document.getElementById('sendBtn');
            const resultBox = document.getElementById('resultBox');
            const waitingState = document.getElementById('waitingState');
            const statusAlert = document.getElementById('statusAlert');
            const outKey = document.getElementById('outKey');
            const outIv = document.getElementById('outIv');
            const outCipher = document.getElementById('outCipher');
            
            if (!message.trim()) {
                alert("Vui lòng nhập văn bản trước khi mã hoá!");
                return;
            }

            // UI UX Loading State
            document.getElementById('btnIcon').outerHTML = `<svg id="btnIcon" class="w-5 h-5 mr-2 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            document.getElementById('btnText').innerText = "Đang xử lý gói tin...";
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const currentData = await response.json();
                
                // Hiển thị Panel kết quả
                waitingState.style.display = 'none';
                resultBox.classList.remove('hidden');

                if (currentData.status === 'success') {
                    // Trạng thái Success
                    statusAlert.className = 'shrink-0 p-4 rounded-xl flex items-start shadow-sm mb-2 bg-emerald-50 border-l-4 border-emerald-500 text-emerald-900';
                    document.getElementById('statusIcon').innerHTML = '🚀';
                    document.getElementById('statusTitle').innerText = 'Truyền Tải Thành Công!';
                    document.getElementById('statusTitle').className = 'font-bold text-sm text-emerald-800';
                    document.getElementById('statusDesc').innerText = `${currentData.log} | Gói dữ liệu: ${currentData.packet_len} Bytes.`;
                    
                    // Render Hex với định dạng đẹp
                    outKey.innerText = currentData.key_hex.match(/.{1,2}/g).join(' ');
                    outIv.innerText = currentData.iv_hex.match(/.{1,2}/g).join(' ');
                    outCipher.innerText = currentData.ciphertext_hex.match(/.{1,2}/g).join(' ');
                } else {
                    // Trạng thái Error
                    statusAlert.className = 'shrink-0 p-4 rounded-xl flex items-start shadow-sm mb-2 bg-rose-50 border-l-4 border-rose-500 text-rose-900';
                    document.getElementById('statusIcon').innerHTML = '⚠️';
                    document.getElementById('statusTitle').innerText = 'Chưa thiết lập kết nối';
                    document.getElementById('statusTitle').className = 'font-bold text-sm text-rose-800';
                    document.getElementById('statusDesc').innerText = `${currentData.message}`;
                    outKey.innerText = 'NULL'; outIv.innerText = 'NULL'; outCipher.innerText = 'NULL';
                }

            } catch (error) {
                alert("Lỗi máy chủ Backend!");
            } finally {
                // Khôi phục Nút bấm
                setTimeout(() => {
                    document.getElementById('btnIcon').outerHTML = `<svg id="btnIcon" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
                    document.getElementById('btnText').innerText = "Tiến Hành Mã Hoá (DES-CBC)";
                    btn.disabled = false;
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                }, 500); // Delay giả lập một chút cho mượt mắt
            }
            
            // Xoá text input 
            document.getElementById('messageInput').value = '';
        }
    </script>
</body>
</html>
