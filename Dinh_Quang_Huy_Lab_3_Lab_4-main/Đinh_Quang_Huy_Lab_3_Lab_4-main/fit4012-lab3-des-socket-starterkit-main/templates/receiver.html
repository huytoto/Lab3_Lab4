<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>RECEIVER - MÁY NHẬN (Server)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen p-8 font-sans text-slate-200 flex justify-center">

    <div class="w-full max-w-4xl flex flex-col">
        <div class="flex items-center mb-6 border-b border-slate-700 pb-4">
            <div class="relative flex h-4 w-4 mr-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-4 w-4 bg-green-500"></span>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white">MÁY NHẬN (RECEIVER)</h1>
                <p class="text-green-400 text-sm mt-1">Giao diện TCP Server theo dõi thời gian thực (Cổng 5001)</p>
            </div>
        </div>

        <div id="logContainer" class="flex-grow space-y-4 overflow-auto">
            <!-- Box Mặc định chờ kết nối -->
            <div class="bg-slate-800/50 rounded-xl p-6 border border-slate-700 text-center text-slate-500">
                <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Đang trực cổng TCP: 6000. Đợi bản tin gửi đến...
            </div>
        </div>
    </div>

    <script>
        // Cứ 1 giây rưỡi lấy danh sách tin một lần
        setInterval(async () => {
            try {
                const res = await fetch('/api/logs');
                const logs = await res.json();
                const container = document.getElementById('logContainer');
                
                if (logs.length > 0) {
                    container.innerHTML = logs.map(item => `
                        <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-green-500"></div>
                            
                            <div class="flex justify-between items-end mb-3">
                                <span class="bg-slate-700 text-xs px-2 py-1 rounded text-slate-300">Từ IP: ${item.from_ip}:${item.from_port}</span>
                            </div>
                            
                            <div class="mb-4">
                                <h3 class="text-xs uppercase text-slate-400 font-bold mb-1 tracking-wider">Tin Giải Mã Được:</h3>
                                <p class="text-xl font-bold text-white bg-slate-900 px-4 py-3 rounded-lg border border-slate-700 inline-block">${item.message}</p>
                            </div>

                            <div class="grid grid-cols-2 gap-4 text-[11px] font-mono text-slate-400">
                                <div class="bg-slate-900 border border-slate-700 p-2 rounded break-all">
                                    <span class="text-pink-400 font-bold">KEY:</span> ${item.key_hex}
                                </div>
                                <div class="bg-slate-900 border border-slate-700 p-2 rounded break-all">
                                    <span class="text-orange-400 font-bold">IV:</span> ${item.iv_hex}
                                </div>
                                <div class="bg-slate-900 border border-slate-700 p-2 rounded break-all col-span-2">
                                    <span class="text-blue-400 font-bold">CIPHER:</span> ${item.cipher_hex}
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) {}
        }, 1500);
    </script>
</body>
</html>
